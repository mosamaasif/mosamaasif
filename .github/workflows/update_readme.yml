name: Update GitHub Profile README

on:
  # Run daily at 4:00 AM UTC
  schedule:
    - cron: '0 4 * * *'

  # Allow manual trigger
  workflow_dispatch:

  # Run on push to main (for testing)
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate SVG files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd scripts
          python generate_svg.py

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet assets/*.svg || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/*.svg
          git commit -m "🤖 Update GitHub stats [skip ci]"
          git push

      - name: No changes
        if: steps.check_changes.outputs.changes != 'true'
        run: |
          echo "No changes detected in SVG files or cache"
